<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barend Declaratie App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-deeper: #085041;
      --green-light: #E1F5EE;
      --green-mid: #5DCAA5;
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --surface2: #F1EFE8;
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --text-hint: #9b9b96;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a;
        --surface: #232326;
        --surface2: #2c2c30;
        --text: #f0ede8;
        --text-muted: #9b9b96;
        --text-hint: #666663;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --green-light: #0a2e22;
        --green-mid: #0F6E56;
      }
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .app-header {
      margin-bottom: 2rem;
    }
    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .app-title span {
      color: var(--green);
    }
    .app-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Name input */
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .name-input {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1.5rem;
    }
    .name-input::placeholder { color: var(--text-hint); }
    .name-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }

    .greeting {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      min-height: 24px;
      margin-bottom: 1.5rem;
    }

    /* Calendar card */
    .cal-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .cal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-nav {
      display: flex;
      gap: 6px;
    }
    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--border-strong); }
    .nav-btn:active { transform: scale(0.97); }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }
    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-hint);
      padding: 3px 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.13s;
      position: relative;
      color: var(--text);
      font-weight: 400;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .day-cell:hover:not(.empty) {
      background: var(--surface2);
      border-color: var(--border);
    }
    .day-cell:active:not(.empty) { transform: scale(0.93); }
    .day-cell.empty { cursor: default; }
    .day-cell.today {
      border-color: var(--green);
      color: var(--green);
      font-weight: 600;
    }
    .day-cell.checked {
      background: var(--green-light);
      border-color: var(--green-mid);
    }
    .day-cell.checked .day-num { color: var(--green-dark); font-weight: 600; }
    .check-dot {
      display: none;
      position: absolute;
      top: 3px;
      right: 3px;
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 50%;
    }
    .day-cell.checked .check-dot { display: block; }

    /* Bottom row */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-hint);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .stat-unit {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 3px;
    }

    .export-btn {
      background: var(--green);
      border: none;
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      cursor: pointer;
      color: white;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .export-btn:hover { background: var(--green-dark); }
    .export-btn:active { background: var(--green-deeper); transform: scale(0.97); }
    .export-btn .btn-main { font-size: 14px; font-weight: 600; }
    .export-btn .btn-sub { font-size: 11px; opacity: 0.8; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 360px) {
      .app-title { font-size: 23px; }
      .day-cell { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div class="app-title">Barend <span>Declaratie</span> App</div>
      <div class="app-sub">Vink je dagen aan en exporteer naar PDF</div>
    </div>

    <label class="field-label" for="nameInput">Jouw naam</label>
    <input class="name-input" id="nameInput" type="text" placeholder="Typ je naam..." autocomplete="off" />

    <div class="greeting" id="greeting"></div>

    <div class="cal-card">
      <div class="cal-header">
        <div class="cal-title" id="calTitle"></div>
        <div class="cal-nav">
          <button class="nav-btn" id="prevBtn">&#8249;</button>
          <button class="nav-btn" id="todayBtn">Vandaag</button>
          <button class="nav-btn" id="nextBtn">&#8250;</button>
        </div>
      </div>
      <div class="weekdays">
        <div class="weekday">Ma</div>
        <div class="weekday">Di</div>
        <div class="weekday">Wo</div>
        <div class="weekday">Do</div>
        <div class="weekday">Vr</div>
        <div class="weekday">Za</div>
        <div class="weekday">Zo</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="bottom-row">
      <div class="stat-card">
        <div class="stat-label">Deze maand</div>
        <div class="stat-value" id="statChecked">0<span class="stat-unit">dagen</span></div>
      </div>
      <button class="export-btn" id="exportBtn">
        <span class="btn-main">PDF exporteren</span>
        <span class="btn-sub">Aangevinkte dagen</span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const MONTHS = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
    const WEEKDAYS_FULL = ['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
    const STORAGE_KEY_CHECKED = 'barend_checked';
    const STORAGE_KEY_NAME = 'barend_name';

    let currentDate = new Date();
    let viewYear = currentDate.getFullYear();
    let viewMonth = currentDate.getMonth();
    let checkedDays = {};
    let userName = '';

    function loadData() {
      try {
        const c = localStorage.getItem(STORAGE_KEY_CHECKED);
        if (c) checkedDays = JSON.parse(c);
      } catch(e) {}
      try {
        const n = localStorage.getItem(STORAGE_KEY_NAME);
        if (n) { userName = n; document.getElementById('nameInput').value = n; }
      } catch(e) {}
      updateGreeting();
      renderCalendar();
    }

    function saveChecked() {
      try { localStorage.setItem(STORAGE_KEY_CHECKED, JSON.stringify(checkedDays)); } catch(e) {}
    }

    function saveName(n) {
      try { localStorage.setItem(STORAGE_KEY_NAME, n); } catch(e) {}
    }

    function dayKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function updateGreeting() {
      const el = document.getElementById('greeting');
      const h = new Date().getHours();
      const t = h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Goedenavond';
      el.textContent = userName ? `${t}, ${userName}!` : '';
    }

    function renderCalendar() {
      document.getElementById('calTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';
      const first = new Date(viewYear, viewMonth, 1);
      let startDay = first.getDay();
      startDay = startDay === 0 ? 6 : startDay - 1;
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      let monthChecked = 0;

      for (let i = 0; i < startDay; i++) {
        const el = document.createElement('div');
        el.className = 'day-cell empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const key = dayKey(viewYear, viewMonth, d);
        const isChecked = !!checkedDays[key];
        if (isChecked) monthChecked++;
        const isToday = d === currentDate.getDate() && viewMonth === currentDate.getMonth() && viewYear === currentDate.getFullYear();
        const el = document.createElement('div');
        el.className = 'day-cell' + (isToday ? ' today' : '') + (isChecked ? ' checked' : '');
        el.innerHTML = `<div class="check-dot"></div><span class="day-num">${d}</span>`;
        el.addEventListener('click', () => toggleDay(key));
        grid.appendChild(el);
      }

      document.getElementById('statChecked').innerHTML = `${monthChecked}<span class="stat-unit">dagen</span>`;
    }

    function toggleDay(key) {
      if (checkedDays[key]) delete checkedDays[key];
      else checkedDays[key] = true;
      saveChecked();
      renderCalendar();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const name = userName || 'Onbekend';
      const m = 20;
      let y = m;

      // Title
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(20);
      doc.setTextColor(15, 110, 86);
      doc.text('Barend Declaratie App', m, y); y += 9;

      // Meta
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.setTextColor(100, 100, 100);
      doc.text(`Naam: ${name}`, m, y); y += 6;
      doc.text(`Gegenereerd op: ${currentDate.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })}`, m, y); y += 10;

      // Divider
      doc.setDrawColor(200, 200, 200);
      doc.line(m, y, 210 - m, y); y += 8;

      // Gather all months
      const allMonths = {};
      Object.keys(checkedDays).sort().forEach(key => {
        const [yr, mo] = key.split('-');
        const mk = `${yr}-${mo}`;
        if (!allMonths[mk]) allMonths[mk] = [];
        allMonths[mk].push(key);
      });

      let totalDays = 0;

      if (Object.keys(allMonths).length === 0) {
        doc.setFontSize(11);
        doc.setTextColor(150, 150, 150);
        doc.text('Geen dagen aangevinkt.', m, y);
      } else {
        Object.keys(allMonths).forEach(mk => {
          const [yr, mo] = mk.split('-');
          const monthName = `${MONTHS[parseInt(mo) - 1]} ${yr}`;
          const keys = allMonths[mk];

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(13);
          doc.setTextColor(15, 110, 86);
          doc.text(monthName, m, y); y += 7;

          doc.setFont('helvetica', 'normal');
          doc.setFontSize(11);
          doc.setTextColor(40, 40, 40);

          keys.forEach(key => {
            const [ky, km, kd] = key.split('-');
            const date = new Date(parseInt(ky), parseInt(km) - 1, parseInt(kd));
            const wdIdx = date.getDay();
            const wdAdj = wdIdx === 0 ? 6 : wdIdx - 1;
            const label = `   ${String(kd).padStart(2, '0')} ${MONTHS[parseInt(km) - 1].slice(0, 3)} ${ky}   —   ${WEEKDAYS_FULL[wdAdj]}`;
            doc.text(label, m, y); y += 6; totalDays++;
            if (y > 270) { doc.addPage(); y = m; }
          });
          y += 5;
        });

        // Total
        doc.setDrawColor(200, 200, 200);
        doc.line(m, y, 210 - m, y); y += 8;
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(13);
        doc.setTextColor(15, 110, 86);
        doc.text(`Totaal aangevinkte dagen: ${totalDays}`, m, y);
      }

      const filename = `barend-declaratie-${name.toLowerCase().replace(/\s+/g, '-')}.pdf`;
      doc.save(filename);
      showToast('PDF opgeslagen!');
    }

    // Events
    document.getElementById('nameInput').addEventListener('input', e => {
      userName = e.target.value.trim();
      saveName(userName);
      updateGreeting();
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      viewYear = currentDate.getFullYear(); viewMonth = currentDate.getMonth(); renderCalendar();
    });
    document.getElementById('exportBtn').addEventListener('click', exportPDF);

    loadData();
  </script>
</body>
</html>
